<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match Game</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!--Main Menu--> 
    <section id="menu-screen" class="screen">
        <div class="menu-card">
            <h1>🧠 Memory Match Game</h1>
            <p class="welcome-text">Welcome! Test your memory by matching all the cards.</p>
            <div class="menu-group">
                <label for="player-name">Player Name</label>
                <input id="player-name" type="text" maxlength="20" placeholder="Anonymous">
            </div>
            <div class="menu-group">
                <p>Difficulty</p>
                <div class="difficulty-controls">
                    <button id="easy-btn">Easy</button>
                    <button id="medium-btn">Medium</button>
                    <button id="hard-btn">Hard</button>
                </div>
            </div>
            <button id="play-btn">▶️ Play</button>
            <button id="leaderboard-btn">🏆 Leaderboard</button>
        </div>
    </section>

    <!--Game Screen-->
    <section id="game-screen" class="hidden">
        <div class="container">
            <h1>🧠 Memory Match Game</h1>
            <p class="current-player">Player: <span id="current-player">Anonymous</span></p>
            <div class="game-info" id="game-info">
                <p>Moves: <span id="moves">0</span></p>
                <p>Time: <span id="timer">00:00</span></p>
                <p>Difficulty: <span id="difficulty">Easy</span></p>
                <p>Score: <span id="score">0</span></p>
                <p>Best: <span id="best-score">0</span></p>
            </div>
            <div class="game-board" id="game-board">

            </div>
            <div class="board-controls">
                <button id="play-again-btn">Play Again</button>
                <button id="menu-btn">Main Menu</button>
                <button id="results-btn">Leaderboard</button>
            </div>
        </div>
    </section>

    <!--Leaderboard Modal-->
    <div id="leaderboard-modal" class="modal hidden">
        <div class="modal-content">
            <h2>🏆 Leaderboard</h2>
            <div id="leaderboard-content">
                <h3>Easy</h3>
                <div id="easy-leaderboard"></div>
                <h3>Medium</h3>
                <div id="medium-leaderboard"></div>
                <h3>Hard</h3>
                <div id="hard-leaderboard"></div>
            </div>
            <button id="close-leaderboard-btn">Close</button>
        </div>
    </div>

    <!--Game Over Modal-->
        
    <div id="game-over-modal" class="modal hidden">
        <div class="modal-content">
            <h2>🎉Congratulations</h2>
            <div id="game-summary">

            </div>
            <div class="modal-controls">
                <button id="play-again-btn">Play Again</button>
                <button id="menu-btn">Main Menu</button>
                <button id="results-btn">Leaderboard</button>
            </div>
        </div>
    </div>

    <audio id="background-music" src="assets/audio/background.mp3" loop></audio>
    <audio id="click-sound" src="assets/audio/click.mp3"></audio>
    <audio id="flip-sound" src="assets/audio/flip.mp3"></audio>
    <audio id="match-sound" src="assets/audio/match.mp3"></audio>
    <audio id="mismatch-sound" src="assets/audio/mismatch.mp3"></audio>
    <audio id="restart-sound" src="assets/audio/restart.mp3"></audio>
    <audio id="timer-sound" src="assets/audio/timer.mp3" loop></audio>
    <audio id="win-sound" src="assets/audio/win.mp3"></audio>
    
    
    
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/board.js"></script>
    <script src="js/timer.js"></script>
    <script src="js/score.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/statistics.js"></script>
    <script src="js/screen.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
